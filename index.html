<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skitluga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-neutral-950 flex justify-center items-center h-screen">

    <div id="card" class="bg-neutral-900 border border-neutral-800 p-8 rounded-xl shadow-2xl text-center w-full max-w-sm text-white opacity-0">
        <h1 class="text-3xl font-semibold tracking-tight mb-2">Skitluga</h1>
        <p class="text-neutral-400 mb-6">Welcome to my page! More coming soon...</p>
        
<a href="https://github.com/skitluga?tab=repositories" class="inline-block bg-white text-black hover:bg-neutral-200 px-5 py-2 rounded-md font-medium transition-colors text-center">
    View My Work
</a>
    </div>

    <script>
        // intro anim
        anime({
            targets: '#card',
            translateY: [50, 0],
            opacity: [0, 1],
            duration: 1000,
            easing: 'easeOutExpo'
        });

        // interactive button anim
        document.getElementById('cta-button').addEventListener('click', () => {
            anime({
                targets: '#cta-button',
                scale: [1, 0.95, 1],
                duration: 200,
                easing: 'easeInOutQuad'
            });
        });
    </script>
</body>
</html>
